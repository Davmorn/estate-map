name: Weekly Estate Sale Update

on:
  schedule:
    # Thursday 6pm MDT = Friday 00:00 UTC (summer). Adjust for winter (MST = UTC-7): use 01:00.
    - cron: '0 0 * * 5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run scraper and generate map
        run: uv run python scripts/main.py
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}

      - name: Commit updated data and map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sales.json data/geocache.json docs/index.html
          git diff --staged --quiet || git commit -m "Weekly update $(date -u +%Y-%m-%d)"
          git push
